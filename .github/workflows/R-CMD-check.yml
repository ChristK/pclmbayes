# =============================================================================
# R CMD Check Workflow for pclmbayes
# =============================================================================
#
# Runs comprehensive R CMD check across multiple platforms and R versions to
# ensure CRAN compliance and cross-platform compatibility.
#
# Workflow triggers:
# - Push to main / master branches
# - Pull requests to main / master branches
#
# Testing matrix covers:
# - Operating Systems: macOS (Apple Silicon), Windows, Ubuntu
# - R Versions: devel, release, oldrel-1 (devel allowed to fail)
#
# pclmbayes is a pure-R package (no C/C++), so the system-dependency
# block is intentionally minimal: only pandoc (for the vignette) is
# required across platforms.
#
# Workflow style adapted from
# https://github.com/r-lib/actions/tree/v2/examples and from the
# matching pipeline in ChristK/CKutils.
# =============================================================================

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

# Cancel in-progress runs when a new run is triggered on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    # Allow R-devel builds to fail without failing the entire workflow
    continue-on-error: ${{ matrix.config.allow-failure || false }}

    strategy:
      fail-fast: false
      matrix:
        config:
          # macOS (Apple Silicon)
          - {os: macos-latest,   r: 'release'}
          - {os: macos-latest,   r: 'devel', http-user-agent: 'release', allow-failure: true}
          - {os: macos-latest,   r: 'oldrel-1'}

          # Windows
          - {os: windows-latest, r: 'release'}
          - {os: windows-latest, r: 'devel', http-user-agent: 'release', allow-failure: true}
          - {os: windows-latest, r: 'oldrel-1'}

          # Ubuntu (primary CRAN-checking environment)
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release', allow-failure: true}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}
          - {os: ubuntu-latest,  r: 'oldrel-2'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      CI: true
      _R_CHECK_TESTS_NLINES_: 0

    steps:
      # Step 1: Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Pandoc (vignette)
      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      # Step 3: R
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # Step 4: package dependencies
      # pclmbayes only Imports base packages, so this is fast.  We add
      # rcmdcheck for R CMD check itself, plus the Suggests (tinytest,
      # knitr, rmarkdown) needed to run tests and build the vignette.
      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck

      # Step 5: R CMD check
      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true

      # Step 6: Upload installation log on failure
      - name: Upload 00install.out log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-log-${{ matrix.config.os }}-${{ matrix.config.r }}
          path: check/pclmbayes.Rcheck/00install.out
          if-no-files-found: ignore

      # Step 7: Upload all check logs on failure
      - name: Upload all check logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-logs-${{ matrix.config.os }}-${{ matrix.config.r }}
          path: check/pclmbayes.Rcheck/
          if-no-files-found: ignore
