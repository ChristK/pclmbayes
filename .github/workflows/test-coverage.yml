# =============================================================================
# Test Coverage Workflow for pclmbayes
# =============================================================================
#
# Measures code coverage with covr and uploads results to Codecov for
# trend tracking and pull-request annotation.
#
# Triggers:
# - Push to main / master
# - Pull requests to main / master
#
# Note: this workflow only runs successfully if the repository has a
# CODECOV_TOKEN secret.  If you have not set up Codecov yet, the upload
# step will simply skip (`fail_ci_if_error: false`), so the workflow
# still finishes green on coverage measurement alone.
# =============================================================================

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: test-coverage

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr
          needs: coverage

      - name: Measure test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(Sys.getenv("RUNNER_TEMP"), "package"),
            type = "all"
          )
          covr::to_cobertura(cov, filename = "coverage.xml")
          print(cov)
        shell: Rscript {0}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unittests
          name: codecov-pclmbayes
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Show test output if available
        if: always()
        run: |
          echo "=== Searching for test output files ==="
          find ${{ runner.temp }}/package -name '*.Rout*' -exec echo "Found: {}" \; || true
          echo ""
          echo "=== Test output content ==="
          find ${{ runner.temp }}/package -name '*.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
          retention-days: 7
